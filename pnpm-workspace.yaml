packages:
  - "."

minimumReleaseAge: 4320

# Next.js 16 bundles a vulnerable PostCSS release; keep its transitive dependency patched.
overrides:
  "next>postcss": ">=8.5.10"

allowBuilds:
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - ws@7.5.11
  - js-yaml@4.1.2
  - '@babel/core@7.29.1'
